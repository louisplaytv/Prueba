<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Auto-Builds REAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Efecto de brillo para las cartas al pasar el ratón */
        .player-card:hover {
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
            transform: translateY(-5px);
        }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans">
    
    <nav class="p-4 border-b border-yellow-500 bg-slate-900 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-2xl font-black text-yellow-400 italic tracking-wider">eF-BUILDER REAL</h1>
        <span class="bg-green-600 text-[10px] font-bold px-2 py-1 rounded-full animate-pulse">ACTUALIZACIÓN REAL</span>
    </nav>

    <main class="container mx-auto p-6">
        <div id="player-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </main>

    <script>
        async function cargarJugadores() {
            try {
                // Forzamos que no use caché para ver los cambios al instante
                const res = await fetch('players.json?v=' + str(new Date().getTime()));
                const datos = await res.json();
                const grid = document.getElementById('player-grid');
                
                if (datos.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center text-slate-500">Esperando la primera actualización del robot...</p>';
                    return;
                }

                grid.innerHTML = datos.map(p => `
                    <div class="player-card bg-slate-800 rounded-2xl overflow-hidden border border-slate-700 shadow-xl transition-all duration-300 relative group">
                        <div class="h-60 bg-slate-700 relative overflow-hidden">
                            <img src="${p.foto}" alt="${p.nombre}" class="absolute bottom-0 left-1/2 -translate-x-1/2 h-[110%] object-cover object-bottom transition-transform duration-500 group-hover:scale-110">
                            <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/40 to-transparent"></div>
                            
                            <div class="absolute top-4 right-4 bg-yellow-500 text-black font-black text-3xl px-3 py-1 rounded-full shadow-lg">${p.media}</div>
                            <div class="absolute top-4 left-4 bg-slate-900/80 text-yellow-400 font-bold text-sm px-3 py-1 rounded-full border border-yellow-500/50">${p.posicion}</div>
                        </div>

                        <div class="p-5 relative">
                            <h3 class="font-black text-2xl text-white uppercase truncate mb-1">${p.nombre}</h3>
                            <p class="text-slate-400 text-xs mb-4">Entrenamiento Recomendado (Meta):</p>
                            
                            <div class="grid grid-cols-2 gap-x-4 gap-y-2 text-sm font-mono bg-slate-950/50 p-4 rounded-xl border border-slate-700">
                                <div class="flex justify-between">
                                    <span class="text-slate-300">TIRO:</span>
                                    <span class="text-green-400 font-bold">+${p.build.Tiro}</span>
                                </div>
                                <div class="flex justify-between">
                                    <span class="text-slate-300">PASE:</span>
                                    <span class="text-green-400 font-bold">+${p.build.Pase}</span>
                                </div>
                                <div class="flex justify-between">
                                    <span class="text-slate-300">DESTREZA:</span>
                                    <span class="text-green-400 font-bold">+${p.build.Destreza}</span>
                                </div>
                                <div class="flex justify-between">
                                    <span class="text-slate-300">FUERZA:</span>
                                    <span class="text-green-400 font-bold">+${p.build.Fuerza}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) { 
                document.getElementById('player-grid').innerHTML = '<p class="col-span-full text-center text-red-500">Error cargando datos. Asegúrate de que el robot haya corrido.</p>';
            }
        }
        cargarJugadores();
    </script>
</body>
</html>
