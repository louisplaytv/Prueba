<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball HUB Clone - Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0f15; font-family: 'Roboto', sans-serif; color: #e2e8f0; }
        .hub-card { background: #161d27; border: 1px solid #2d3748; transition: 0.2s; cursor: pointer; }
        .hub-card:hover { border-color: #38bdf8; background: #1c2635; }
        .rating-box { background: linear-gradient(180deg, #facc15, #ca8a04); color: #000; font-weight: 900; }
        .stat-bar-bg { height: 4px; background: #2d3748; border-radius: 2px; }
        .stat-bar-fill { height: 100%; background: #38bdf8; box-shadow: 0 0 8px #38bdf8; }
        .pos-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        /* Colores de posiciones oficiales */
        .pos-cf { background: #e11d48; } .pos-rwf { background: #e11d48; }
        .pos-amf { background: #2563eb; } .pos-cb { background: #16a34a; }
    </style>
</head>
<body>

    <header class="bg-[#161d27] border-b border-blue-500/20 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <span class="bg-blue-600 text-white px-2 py-1 rounded font-black text-xl">H</span>
                <span class="text-xl font-black tracking-tighter uppercase">eFootball<span class="text-blue-500">HUB</span></span>
            </div>
            
            <div class="relative w-full md:w-1/2">
                <input type="text" id="main-search" placeholder="Buscar jugadores (ej: Messi, Mbappe...)" 
                    class="w-full bg-[#0b0f15] border border-slate-700 rounded-lg py-2 px-10 focus:border-blue-500 outline-none">
                <span class="absolute left-3 top-2.5 text-slate-500">🔍</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-8">
        <div id="player-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            </div>
    </main>

    <script>
        let playersData = [];

        async function fetchPlayers() {
            try {
                const res = await fetch('players.json?v=' + Date.now());
                playersData = await res.json();
                render(playersData);
            } catch (e) {
                console.error("Error cargando JSON");
                document.getElementById('player-grid').innerHTML = "<p class='text-center col-span-full'>Ejecuta el Scraper en GitHub para ver datos.</p>";
            }
        }

        // Pesos simplificados para calcular la media (OVR)
const pesosPosicion = {
    "CF": { finalizacion: 0.2, actitudOfensiva: 0.15, velocidad: 0.1, potencia: 0.05 },
    "CB": { defensa: 0.25, contactoFisico: 0.15, salto: 0.1, velocidad: 0.05 },
    "AMF": { paseRaso: 0.2, controlBalon: 0.15, regate: 0.1, finalizacion: 0.05 }
};

function calcularMediaDinamica(statsBase, puntosAsignados, posicion) {
    let sumaPonderada = 0;
    const pesos = pesosPosicion[posicion] || pesosPosicion["CF"]; // Por defecto CF

    // Simulamos el impacto de los puntos de progresión
    // Cada punto asignado suele subir +2 o +3 en el stat específico
    for (let stat in pesos) {
        let valorFinal = statsBase[stat] + (puntosAsignados[stat] * 2);
        sumaPonderada += valorFinal * pesos[stat];
    }

    // La base suele ser una constante (ej: 60) + la suma ponderada
    return Math.round(65 + sumaPonderada);
}
        
        function render(list) {
            const grid = document.getElementById('player-grid');
            grid.innerHTML = list.map(p => `
                <div class="hub-card rounded-lg overflow-hidden flex flex-col">
                    <div class="relative h-40 bg-gradient-to-b from-[#1c2635] to-[#161d27]">
                        <img src="${p.foto}" class="absolute bottom-0 left-1/2 -translate-x-1/2 h-[90%] object-contain z-10" onerror="this.src='https://www.konami.com/efootball/s/img/common/noimage_player.png'">
                        <div class="absolute top-2 left-2 z-20">
                            <div class="rating-box w-10 h-10 flex items-center justify-center rounded-md text-xl">${p.media}</div>
                            <div class="pos-badge mt-1 text-center bg-black/50">${p.posicion}</div>
                        </div>
                    </div>

                    <div class="mt-4 p-2 bg-black/30 rounded border border-slate-700">
    <label class="text-[10px] text-slate-400 block mb-1">PUNTOS DE PROGRESIÓN</label>
    <div class="flex items-center gap-2">
        <input type="range" min="0" max="50" value="20" class="w-full h-1 bg-blue-900 rounded-lg appearance-none cursor-pointer">
        <span class="text-blue-400 font-bold text-xs">98 OVR</span>
    </div>
</div>
                    
                    <div class="p-4 flex-grow">
                        <h3 class="font-bold text-sm uppercase truncate mb-4">${p.nombre}</h3>
                        
                        <div class="space-y-3">
                            ${buildStat("TIRO", p.build.Tiro)}
                            ${buildStat("PASE", p.build.Pase)}
                            ${buildStat("DESTREZA", p.build.Destreza)}
                            ${buildStat("FUERZA", p.build.Fuerza)}
                        </div>
                        
                        <button class="w-full mt-4 bg-blue-600/20 hover:bg-blue-600 text-blue-400 hover:text-white text-[10px] font-bold py-2 rounded transition uppercase tracking-tighter">
                            Ver Progresión Completa
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function buildStat(label, value) {
            const perc = (value / 12) * 100;
            return `
                <div>
                    <div class="flex justify-between text-[10px] font-bold mb-1">
                        <span class="text-slate-500">${label}</span>
                        <span class="text-blue-400">+${value}</span>
                    </div>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fill" style="width: ${perc}%"></div>
                    </div>
                </div>`;
        }

        // Buscador instantáneo
        document.getElementById('main-search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = playersData.filter(p => p.nombre.toLowerCase().includes(query));
            render(filtered);
        });

        fetchPlayers();
    </script>
</body>
</html>
