<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball HUB Clone - Auto Builds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0d1117; }
        .efhub-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .player-card { background: #161d27; border: 1px solid #2d3748; transition: all 0.2s; }
        .player-card:hover { border-color: #38bdf8; transform: scale(1.02); }
        .stat-bar { height: 6px; background: #2d3748; border-radius: 3px; overflow: hidden; }
        .stat-fill { height: 100%; background: #38bdf8; box-shadow: 0 0 10px #38bdf8; }
        .rating-badge { background: linear-gradient(to bottom, #fde047, #eab308); color: black; }
    </style>
</head>
<body class="text-slate-200">

    <header class="bg-[#161d27] border-b border-blue-500/30 p-4 sticky top-0 z-50 shadow-2xl">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center font-black text-black">H</div>
                <h1 class="text-xl font-black tracking-tighter text-white">eFootball<span class="text-blue-400">HUB</span> <span class="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded ml-2 italic">AUTO-BUILD</span></h1>
            </div>
            <div class="text-xs text-slate-400 hidden sm:block">
                Última actualización: <span id="update-time" class="text-blue-400 font-bold">Hoy</span>
            </div>
        </div>
    </header>

    <div class="bg-[#0d1117] p-2 border-b border-slate-800 overflow-x-auto whitespace-nowrap">
        <div class="container mx-auto flex gap-4 text-xs font-bold px-4">
            <button class="text-blue-400 border-b-2 border-blue-400 pb-1">TODOS LOS JUGADORES</button>
            <button class="text-slate-500 hover:text-white transition">DESTACADOS</button>
            <button class="text-slate-500 hover:text-white transition">EPIC</button>
        </div>
    </div>

    <main class="container mx-auto p-4 sm:p-6">
        <div id="player-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <div class="col-span-full text-center py-20">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full"></div>
                <p class="mt-4 text-slate-500">Buscando nuevos fichajes...</p>
            </div>
        </div>
    </main>

    <script>
        async function cargarJugadores() {
            try {
                const res = await fetch('players.json?v=' + Date.now());
                const datos = await res.json();
                const grid = document.getElementById('player-grid');
                
                if (datos.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center text-slate-500">No hay datos. Ejecuta el Scraper en GitHub.</p>';
                    return;
                }

                grid.innerHTML = datos.map(p => `
                    <div class="player-card rounded-lg overflow-hidden flex flex-col relative">
                        <div class="relative h-44 bg-[#1c2431] overflow-hidden">
                            <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#38bdf8 1px, transparent 1px); background-size: 10px 10px;"></div>
                            
                            <img src="${p.foto}" class="absolute bottom-0 left-1/2 -translate-x-1/2 h-full object-cover z-10" onerror="this.src='https://www.konami.com/efootball/s/img/common/noimage_player.png'">
                            
                            <div class="absolute top-2 left-2 z-20 flex flex-col items-center">
                                <div class="rating-badge font-black text-2xl w-12 h-12 flex items-center justify-center rounded-lg shadow-lg border-b-2 border-black/20">${p.media}</div>
                                <div class="bg-black text-white text-[10px] font-bold px-2 py-0.5 mt-1 rounded uppercase">${p.posicion}</div>
                            </div>
                        </div>

                        <div class="p-3">
                            <h2 class="font-bold text-base uppercase truncate text-white border-l-4 border-blue-500 pl-2 mb-3">${p.nombre}</h2>
                            
                            <div class="space-y-3">
                                ${generarStatRow("TIRO", p.build.Tiro)}
                                ${generarStatRow("PASE", p.build.Pase)}
                                ${generarStatRow("DESTREZA", p.build.Destreza)}
                                ${generarStatRow("FUERZA", p.build.Fuerza)}
                            </div>

                            <button class="w-full mt-4 bg-blue-600/10 hover:bg-blue-600 border border-blue-500/50 text-blue-400 hover:text-white text-[10px] font-bold py-2 rounded transition-all uppercase tracking-widest">
                                Detalles del Entrenamiento
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
                document.getElementById('player-grid').innerHTML = '<p class="col-span-full text-center text-red-400">Error al cargar el archivo players.json</p>';
            }
        }

        function generarStatRow(label, valor) {
            const anchoBarra = (valor / 12) * 100; // Suponiendo que 12 es el máximo de puntos
            return `
                <div class="flex flex-col">
                    <div class="flex justify-between text-[10px] font-bold mb-1">
                        <span class="text-slate-400">${label}</span>
                        <span class="text-blue-400">+${valor}</span>
                    </div>
                    <div class="stat-bar">
                        <div class="stat-fill" style="width: ${anchoBarra}%"></div>
                    </div>
                </div>
            `;
        }

        cargarJugadores();
    </script>
</body>
</html>]
